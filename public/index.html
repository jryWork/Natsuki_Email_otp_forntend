<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="utf-8" />

  <!-- Viewport -->
   <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />

  <!-- Theme -->
  <meta name="theme-color" content="#ffffff" />

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta
    name="apple-mobile-web-app-status-bar-style"
    content="black-translucent"
  />
  <meta name="apple-mobile-web-app-title" content="Wonderland" />

  <!-- Android PWA -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="application-name" content="Wonderland" />

  <!-- SEO -->
  <meta
    name="description"
    content="Wonderland ระบบดูรหัสยืนยัน Netflix"
  />

  <!-- Icons -->
  <link rel="icon" href="%PUBLIC_URL%/icon.png" />
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/icon.png" />

  <!-- Manifest -->
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

  <title>Wonderland</title>

  <style>
    html,
    body,
    #root {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;

      /* แก้ Safari เว้นขอบ */
      min-height: -webkit-fill-available;
      background: transparent;
    }

    html {
      height: -webkit-fill-available;
    }

    body {
      padding-top: 0 !important;
      padding-bottom: 0 !important;

      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }
  </style>
</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>

  <div id="root"></div>
</body>

</html>
